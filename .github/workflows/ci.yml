# ──────────────────────────────────────────────────────────────────────────────
# soulmate — Continuous Integration
# ──────────────────────────────────────────────────────────────────────────────
# Runs on every push to main and on pull requests.
# Validates code quality without building platform artifacts (saves runner minutes).
# ──────────────────────────────────────────────────────────────────────────────

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install dependencies
        run: npm ci

      - name: lint
        run: npm run lint

      - name: typecheck
        run: npm run typecheck

      - name: unit tests
        run: npm run test:unit
